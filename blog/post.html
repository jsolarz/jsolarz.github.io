<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Redirecting…</title>
		<script>
			const q = location.search || ""
			const slug = new URLSearchParams(q).get("slug")
			const path = slug
				? "/journal/post.html?slug=" + encodeURIComponent(slug)
				: "/journal.html"
			location.replace(path + location.hash)
		</script>
		<link rel="canonical" href="https://ioni.solarz.me/journal.html" />
	</head>
	<body>
		<p><a id="link" href="/journal.html">Continue to journal</a></p>
	</body>
</html>
