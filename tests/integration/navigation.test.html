<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Navigation Integration Tests</title>
	<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
	<div class="container">
		<div data-template="header"></div>
		<main>
			<h1>Navigation Tests</h1>
			<p><a href="../../about.html">About page</a> should link to CV and contact from content (manual).</p>
			<div id="test-results"></div>
		</main>
	</div>

	<script type="module">
		import { templateEngine } from "../../js/template-engine.js"

		const results = document.getElementById("test-results")
		const tests = []

		function testFourLinkNav() {
			const navLinks = document.querySelectorAll(".top-bar-nav a")
			const hrefs = Array.from(navLinks).map((a) => a.getAttribute("href"))
			const expected = ["/index.html", "/journal.html", "/portfolio.html", "/about.html"]
			const passed = navLinks.length === 4 && expected.every((h) => hrefs.includes(h))
			tests.push({
				name: "Four-link primary nav",
				passed,
				issues: passed ? [] : [`Found ${navLinks.length} links: ${hrefs.join(", ")}`],
			})
		}

		function testResponsiveMenu() {
			const details = document.querySelector("details.nav-mobile")
			tests.push({
				name: "Responsive menu (details)",
				passed: !!details,
				issues: details ? [] : ["Mobile menu not found"],
			})
		}

		async function runTests() {
			await templateEngine.loadAllTemplateSections()
			testFourLinkNav()
			testResponsiveMenu()

			let html = "<ul>"
			tests.forEach((test) => {
				const status = test.passed ? "✓" : "✗"
				const color = test.passed ? "var(--aurora-4)" : "var(--error)"
				html += `<li style="color: ${color}">${status} ${test.name}`
				if (test.issues?.length) {
					html += `<ul><li>${test.issues.join("</li><li>")}</li></ul>`
				}
				html += "</li>"
			})
			html += "</ul>"
			results.innerHTML = html
		}

		runTests()
	</script>
</body>
</html>
