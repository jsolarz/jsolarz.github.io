<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Turbo Logic Theme Visual Tests</title>
	<link rel="stylesheet" href="../../css/style.css">
</head>
<body>
	<div class="container">
		<main>
			<h1>Turbo Logic Theme</h1>

			<section class="terminal-window">
				<div class="terminal-header">───[ TOKENS ]───</div>
				<div class="terminal-window-body">
					<p>Background: <code id="token-bg"></code></p>
					<p>Secondary (links/nav): <code id="token-secondary"></code></p>
					<p>Body strings: <code id="token-tertiary"></code></p>
					<p>Container max: <code id="token-container"></code></p>
				</div>
			</section>

			<section>
				<a href="#" class="bracket-link">[ SAMPLE_LINK ]</a>
				<span class="tag-chip">&lt;sample&gt;</span>
			</section>
		</main>
	</div>

	<script>
		const root = getComputedStyle(document.documentElement)
		document.getElementById("token-bg").textContent = root.getPropertyValue("--background").trim() || "(missing)"
		document.getElementById("token-secondary").textContent = root.getPropertyValue("--secondary").trim() || "(missing)"
		document.getElementById("token-tertiary").textContent = root.getPropertyValue("--tertiary-fixed-dim").trim() || "(missing)"
		document.getElementById("token-container").textContent = root.getPropertyValue("--container-max").trim() || "(missing)"
	</script>
</body>
</html>
