<div class="blog-layout">
	<section class="terminal-window">
		<div class="terminal-header">───[ JOURNAL_ARCHIVE ]───</div>
		<div class="terminal-window-body">
			<div class="terminal" role="status" aria-label="Journal entries directory">
				<span class="prompt" aria-hidden="true">$ </span>
				<span class="command" aria-hidden="true">ls -la ~/journal/entries</span>
			</div>

			<ul class="post-list post-list--archive" role="list" aria-label="Journal entries" aria-live="polite">
				<li class="post-item post-item--row">
					<p>Loading entries...</p>
				</li>
			</ul>
		</div>
	</section>

	<aside class="terminal-window">
		<div class="terminal-header">├───[ CATEGORIES ]───┤</div>
		<div class="terminal-window-body terminal-window-body--compact">
			<nav aria-label="Journal categories">
				<ul class="categories-list" role="list">
					<li><a href="#" data-category="tech" aria-label="Filter by Technology category">(technology)</a></li>
					<li><a href="#" data-category="ai" aria-label="Filter by AI category">(ai)</a></li>
					<li><a href="#" data-category="azure" aria-label="Filter by Azure category">(azure)</a></li>
					<li><a href="#" data-category="architecture" aria-label="Filter by Architecture category">(architecture)</a></li>
					<li><a href="#" data-category="design" aria-label="Filter by Design category">(design)</a></li>
				</ul>
			</nav>
		</div>
	</aside>
</div>
