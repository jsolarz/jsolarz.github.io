<section class="terminal-window">
	<div class="terminal-header">───[ CONTACT ]───</div>
	<div class="terminal-window-body">
		<div class="terminal" role="status" aria-label="Contact information">
			<span class="prompt" aria-hidden="true">$ </span>
			<span class="command" aria-hidden="true">cat contact_info.txt</span>
		</div>

		<p>
			Have a question, interested in working together, or just want to say hello? I'd love to hear from you.
		</p>

		<div class="contact-methods">
			<div class="contact-method">
				<h3><span class="highlight-2">Email</span></h3>
				<p>
					<a href="mailto:hello@solarz.me" aria-label="Send email to hello@solarz.me">hello@solarz.me</a><br />
					For professional inquiries and general questions.
				</p>
			</div>

			<div class="contact-method">
				<h3><span class="highlight-2">Social</span></h3>
				<p>
					<a href="https://github.com/jsolarz" aria-label="Jonathan Solarz on GitHub" rel="noopener noreferrer">GitHub</a><br />
					<a href="https://linkedin.com/in/ioni-solarz" aria-label="Jonathan Solarz on LinkedIn" rel="noopener noreferrer">LinkedIn</a>
				</p>
			</div>
		</div>
	</div>
</section>

<section class="terminal-window">
	<div class="terminal-header">├───[ MESSAGE_FORM ]───┤</div>
	<div class="terminal-window-body">
		<form
			id="contact-form"
			class="contact-form"
			aria-label="Contact form"
			data-form-endpoint=""
			data-mailto="hello@solarz.me">
			<p class="contact-form__honeypot" aria-hidden="true">
				<label>Leave this empty <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" /></label>
			</p>
			<div class="form-group">
				<label for="name">Name:</label>
				<input type="text" id="name" name="name" required aria-required="true" />
			</div>

			<div class="form-group">
				<label for="email">Email:</label>
				<input type="email" id="email" name="email" required aria-required="true" />
			</div>

			<div class="form-group">
				<label for="subject">Subject:</label>
				<input type="text" id="subject" name="subject" required aria-required="true" />
			</div>

			<div class="form-group">
				<label for="message">Message:</label>
				<textarea id="message" name="message" rows="6" required aria-required="true"></textarea>
			</div>

			<button type="submit" class="submit-btn btn-bracket">[ SEND_MESSAGE ]</button>
		</form>

		<div id="form-response" class="form-response" hidden role="status" aria-live="polite" aria-atomic="true">
			<div class="bbs-header">Message Status</div>
			<p id="response-text"></p>
		</div>
	</div>
</section>
