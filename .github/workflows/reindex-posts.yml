name: 'Reindex blog posts'
on:
  push:
    branches:
      - master
    paths:
      - "_posts/**"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: reindex-posts-${{ github.ref }}
  cancel-in-progress: true
jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate posts index and manifest
        run: npm run generate-index
      - name: Commit index updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add js/posts-index.json _posts/manifest.json
          if git diff --staged --quiet; then
            echo "Index already up to date."
          else
            git commit -m "chore: regenerate blog post index"
            git push
          fi
