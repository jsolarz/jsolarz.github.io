		<meta property="og:type" content="website" />
		<meta property="og:title" content="Journal | Jonathan Solarz" />
		<meta
			property="og:description"
			content="Personal journal — field notes on architecture, cloud, and code." />

		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Journal | Jonathan Solarz" />

		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Blog",
				"name": "Jonathan Solarz Journal",
				"description": "Personal journal on software architecture and cloud systems",
				"url": "https://ioni.solarz.me/journal.html",
				"author": {
					"@type": "Person",
					"name": "Jonathan Solarz",
					"email": "hello@solarz.me"
				},
				"copyrightHolder": {
					"@type": "Person",
					"name": "Jonathan Solarz"
				},
				"license": "https://creativecommons.org/licenses/by-nc-nd/4.0/"
			}
		</script>

		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<a href="#main-content" class="skip-link">Skip to main content</a>
		<div class="container">
			<div data-template="header"></div>
			<main id="main-content" role="main">
				<div data-template="journal-content"></div>
			</main>
			<div data-template="footer"></div>
		</div>

		<script type="module">
			import { templateEngine } from "./js/template-engine.js"
			import { blogEngine } from "./js/blog-engine.js"
			import "./js/scripts.js"

			document.addEventListener("templateLoaded", async () => {
				const postList = document.querySelector(".post-list")
				if (postList) {
					try {
						await blogEngine.renderPostList(postList)
					} catch (error) {
						console.error("Error loading journal entries:", error)
					}
				}
			})
		</script>
	</body>
</html>
